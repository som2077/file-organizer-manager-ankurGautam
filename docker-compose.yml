services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fileuser
      POSTGRES_PASSWORD: filepass
      POSTGRES_DB: fileorganizer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileuser -d fileorganizer"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- MinIO (S3-compatible Storage) ----
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Create MinIO bucket on startup ----
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/files;
      echo 'Bucket created successfully';
      "

  # ---- App Server ----
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fileuser:filepass@postgres:5432/fileorganizer
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: files
      JWT_SECRET: supersecretkey
      VITE_APP_ID: file-organizer-manager
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  miniodata:
